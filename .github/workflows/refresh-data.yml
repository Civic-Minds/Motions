name: Refresh Council Data

on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: {} # allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
    # trigger UI refresh
    
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run data import
        run: node scripts/import_open_data.js --term=2022-2026

      - name: Fetch meeting schedule
        run: node scripts/fetch_meetings.js

      - name: Upload data to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node scripts/upload_to_blob.js

      - name: Check for motions missing summaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MISSING=$(node scripts/check_missing_summaries.js)
          if [ -n "$MISSING" ]; then
            COUNT=$(echo "$MISSING" | wc -l | tr -d ' ')
            TITLE="🔔 $COUNT new motion(s) need summaries"
            
            BODY="The daily import found motions without summaries. Run the pipeline locally (scripts 2–4) to process them.

            $MISSING"
            
            # Check if an open issue with this label already exists
            EXISTING_ISSUE=$(gh issue list --label "needs-summaries" --state open --limit 1 --json number --jq '.[0].number' --repo ${{ github.repository }})
            
            if [ -n "$EXISTING_ISSUE" ] && [ "$EXISTING_ISSUE" != "null" ]; then
              echo "Updating existing issue #$EXISTING_ISSUE"
              gh issue edit "$EXISTING_ISSUE" \
                --title "$TITLE" \
                --body "$BODY" \
                --repo ${{ github.repository }} || true
            else
              echo "Creating new issue"
              gh issue create \
                --title "$TITLE" \
                --body "$BODY" \
                --label "needs-summaries" \
                --repo ${{ github.repository }} || true
            fi
          fi
