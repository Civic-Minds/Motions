name: Refresh Council Data

on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run data import
        run: node scripts/import_open_data.js --term=2022-2026

      - name: Fetch meeting schedule
        run: node scripts/fetch_meetings.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/motions.json public/data/meetings.json
          git diff --staged --quiet || git commit -m "chore: refresh council data"
          git push
