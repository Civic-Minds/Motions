name: Refresh Council Data

on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: {} # allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
    # trigger UI refresh
    
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run data import
        run: node scripts/import_open_data.js --term=2022-2026

      - name: Fetch meeting schedule
        run: node scripts/fetch_meetings.js

      - name: Upload data to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node scripts/upload_to_blob.js

      - name: Check for motions missing summaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MISSING=$(node scripts/check_missing_summaries.js)
          if [ -n "$MISSING" ]; then
            COUNT=$(echo "$MISSING" | wc -l | tr -d ' ')
            TITLE="🔔 $COUNT new motion(s) need summaries"
            BODY="The latest data import found new motions without summaries.

            $MISSING"
            
            echo "Creating new issue for $COUNT new motions"
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "needs-summaries" \
              --repo ${{ github.repository }} || true
          fi

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          # Only commit and push if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated data refresh" && git push)
