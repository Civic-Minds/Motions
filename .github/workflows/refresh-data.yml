name: Refresh Council Data

on:
  schedule:
    - cron: '0 6 * * 2,4,6' # 6am UTC Tue/Thu/Sat
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip meeting check and run pipeline'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check for recent meeting
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Manual trigger — skipping meeting check"
            exit 0
          fi
          RESULT=$(node scripts/check_recent_meeting.js)
          echo "should_run=$RESULT" >> $GITHUB_OUTPUT
          echo "Recent meeting found: $RESULT"

  refresh:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Download existing data from Blob
        run: |
          mkdir -p public/data
          curl -sf "https://qcbqayy3ivvb6sia.public.blob.vercel-storage.com/motions.json" -o public/data/motions.json || echo "No existing data, starting fresh"

      - name: Run data import
        run: node scripts/import_open_data.js --term=2022-2026

      - name: Fetch meeting schedule
        run: node scripts/fetch_meetings.js

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Scrape agenda text
        run: node scripts/scrape_agenda_text.js

      - name: Extract fields from body text
        run: node scripts/extract_fields.js

      - name: Generate summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate_summaries.js

      - name: Upload data to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node scripts/upload_to_blob.js

      - name: Close stale summary issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MISSING=$(node scripts/check_missing_summaries.js)
          # Close any open needs-summaries issues
          gh api 'repos/${{ github.repository }}/issues?state=open&labels=needs-summaries' \
            --jq '.[].number' | \
            xargs -I {} gh api --method PATCH \
              repos/${{ github.repository }}/issues/{} \
              -f state=closed -f state_reason=completed || true
          # Only open a new issue if motions still lack summaries (e.g. missing body text)
          if [ -n "$MISSING" ]; then
            COUNT=$(echo "$MISSING" | wc -l | tr -d ' ')
            gh api --method POST repos/${{ github.repository }}/issues \
              -f title="⚠️ $COUNT motion(s) could not be summarized" \
              -f body="Summary generation ran but these motions still lack summaries (likely missing body text):

              $MISSING" \
              -f 'labels[]=needs-summaries' || true
          fi
